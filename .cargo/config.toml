# Cargo config for the nopeekOS repo.
#
# The kernel target (+ build-std) is passed explicitly on the CLI by
# build.sh — see the `cargo build` invocations there — so nothing in
# this file forces a global default target.
#
# Keeping `[build]` + `[unstable]` empty here means tools and libraries
# that live in this repo but run on the host (e.g. the widget SDK's
# unit tests under tools/wasm/sdk/widgets/) can invoke `cargo test`
# directly and get the host triple + precompiled std — fast, portable,
# no local overrides needed.
#
# The `[target.x86_64-unknown-none]` block below is a conditional
# table: it only applies when cargo is actually building for the
# bare-metal kernel target (triggered by build.sh's `--target` flag).
# Host-side invocations never see these rustflags.
#
# target-feature overlays the built-in x86_64-unknown-none defaults
# (which force +soft-float / -sse for "no FPU" kernels). We want SSE
# + AES-NI + PCLMUL so the aes-gcm crate compiles in its hardware
# backend (~50× faster than soft AES) and blake3 pulls in its SIMD
# backend. CR0/CR4 are configured in boot.s + smp/trampoline.s before
# the first Rust instruction runs.

[target.x86_64-unknown-none]
runner = "bash build.sh run"

# Linker script (path relative to the kernel build's CWD = repo root).
rustflags = [
    "-C", "link-arg=-Tkernel/linker.ld",
    "-C", "relocation-model=static",
    "-C", "target-feature=+sse,+sse2,+ssse3,+sse4.1,+sse4.2,+aes,+pclmulqdq,-soft-float",
]
