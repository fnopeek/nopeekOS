[build]
target = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-gnu]
linker = "rust-lld"
rustflags = [
    # Build a fully static, no-runtime, no-libc Linux ELF executable
    # (we are PID 1 and use raw syscalls only — see src/main.rs).
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-static",
    "-C", "link-arg=--no-dynamic-linker",
    "-C", "relocation-model=static",
]
