[package]
name = "nopeekos-kernel"
version = "0.1.0"
edition = "2021"
authors = ["nopeek"]
description = "nopeekOS – AI-native Operating System Kernel"

[dependencies]
spin = "0.10"         # Spinlock (no_std mutex)
bitflags = "2.11"     # Flag-basierte Enums

[dependencies.lazy_static]
version = "1.5"
features = ["spin_no_std"]

[dependencies.wasmi]
version = "1.0"
default-features = false
features = ["prefer-btree-collections"]

[dependencies.blake3]
version = "1.8"
default-features = false

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = 2
lto = true
