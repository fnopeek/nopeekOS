[package]
name = "nopeekos-kernel"
version = "0.1.0"
edition = "2021"
authors = ["nopeek"]
description = "nopeekOS – AI-native Operating System Kernel"

[dependencies]
spin = "0.9"          # Spinlock (no_std mutex)
bitflags = "2.4"      # Flag-basierte Enums

[dependencies.lazy_static]
version = "1.4"
features = ["spin_no_std"]

# WASM runtime (Phase 3)
# wasmi = { version = "0.31", default-features = false }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = 2
lto = true
